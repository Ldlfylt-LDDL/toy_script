.main{flex:1;display:flex;position:relative;overflow:hidden}
#gc{flex:1;position:relative}
#gc svg{width:100%;height:100%;cursor:grab}
#gc svg:active{cursor:grabbing}

.side{width:260px;background:rgba(13,19,33,.96);border-left:1px solid rgba(99,179,237,.08);padding:14px;overflow-y:auto;flex-shrink:0;transition:width .2s}
.side.off{width:0;padding:0;border:none;overflow:hidden}
.side h3{font-family:'JetBrains Mono',monospace;font-size:10px;color:#4fd1c5;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.li{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:11px;cursor:pointer;opacity:.75;transition:opacity .15s}
.li:hover{opacity:1}
.li.off{opacity:.25}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.ni{margin-top:16px;padding-top:14px;border-top:1px solid rgba(99,179,237,.08)}
.nt{font-size:15px;font-weight:700;color:#f0f4f8;margin-bottom:4px}
.nm{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(200,214,229,.45);margin-bottom:10px}
.sl{font-family:'JetBrains Mono',monospace;font-size:9px;color:#4fd1c5;text-transform:uppercase;letter-spacing:1.5px;margin:10px 0 4px}
.di{font-size:11px;padding:2px 0;color:#a0aec0;cursor:pointer;transition:color .12s}
.di:hover{color:#63b3ed}
.di .am{font-family:'JetBrains Mono',monospace;font-size:9px;color:#ed8936;margin-left:3px}

.tip{position:absolute;pointer-events:none;background:rgba(13,19,33,.96);border:1px solid rgba(99,179,237,.25);border-radius:5px;padding:7px 11px;font-size:11px;color:#f0f4f8;z-index:300;opacity:0;transition:opacity .12s;max-width:220px}
.tip.v{opacity:1}

.st{position:absolute;bottom:12px;left:14px;font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(200,214,229,.35);display:flex;gap:14px;z-index:50}

}

/* ═══ compute layer (longest-path from roots) ═══ */
function assignLayers(nodes,edges){
  const map={}; nodes.forEach(n=>{map[n.id]=n;});
  const inE={}; nodes.forEach(n=>{inE[n.id]=[];});
  edges.forEach(e=>{ if(inE[e.target]) inE[e.target].push(e.source); });

  const memo={};
  function depth(id){
    if(memo[id]!==undefined) return memo[id];
    memo[id]=-1; // cycle guard
    const parents=inE[id]||[];
    if(parents.length===0){memo[id]=0; return 0;}
    let mx=0;
    for(const p of parents){ const d=depth(p); if(d>=0) mx=Math.max(mx,d+1); }
    memo[id]=mx; return mx;
  }
  nodes.forEach(n=>{ n.layer=depth(n.id); });

  // research → rightmost
  let mx=0; nodes.forEach(n=>{ if(n.cat!=="research") mx=Math.max(mx,n.layer); });
  nodes.forEach(n=>{ if(n.cat==="research") n.layer=mx+1; });
  return mx+1; // total layers (0..mx+1)
}

/* ═══ layer-internal ordering (barycenter) ═══ */
function orderWithinLayers(nodes,edges,numLayers){
  const byLayer=[]; for(let i=0;i<=numLayers;i++) byLayer[i]=[];
  nodes.forEach(n=>byLayer[n.layer].push(n));

  // initial: sort by category
  const catOrder=["energy","resource","quarry","mining","agriculture","refinery","intermediate",
    "food","construction","factory","consumer","aerospace","research"];
  byLayer.forEach(arr=>{
    arr.sort((a,b)=>{
      const ca=catOrder.indexOf(a.cat), cb=catOrder.indexOf(b.cat);
      return (ca-cb)||(a.name<b.name?-1:1);
    });
    arr.forEach((n,i)=>{n._ord=i;});
  });

  const map={}; nodes.forEach(n=>{map[n.id]=n;});

  // barycenter sweeps
  for(let sweep=0;sweep<6;sweep++){
    // forward
    for(let ly=1;ly<=numLayers;ly++){
      byLayer[ly].forEach(n=>{
        const parents=edges.filter(e=>e.target===n.id).map(e=>map[e.source]).filter(Boolean);
        if(parents.length) n._bary=parents.reduce((s,p)=>s+p._ord,0)/parents.length;
        else n._bary=n._ord;
      });
      byLayer[ly].sort((a,b)=>a._bary-b._bary);
      byLayer[ly].forEach((n,i)=>{n._ord=i;});
    }
    // backward
    for(let ly=numLayers-1;ly>=0;ly--){
      byLayer[ly].forEach(n=>{
        const children=edges.filter(e=>e.source===n.id).map(e=>map[e.target]).filter(Boolean);
        if(children.length) n._bary=children.reduce((s,c)=>s+c._ord,0)/children.length;
        else n._bary=n._ord;
      });
      byLayer[ly].sort((a,b)=>a._bary-b._bary);
      byLayer[ly].forEach((n,i)=>{n._ord=i;});
    }
  }

  return byLayer;
}

/* ═══ render ═══ */
let svg,gRoot,allNodes,allEdges,showLabels=true,selNode=null;
let nodeSel,linkSel,lblSel;

function render(){
  const {nodes,edges}=getData();
  allNodes=nodes; allEdges=edges;
  const numLayers=assignLayers(nodes,edges);
  const byLayer=orderWithinLayers(nodes,edges,numLayers);

  /* ── coordinates ── */
  const COL_W=220;           // horizontal spacing
  const ROW_H=36;            // vertical spacing
  const PAD_L=100, PAD_T=50;
  const maxInCol=Math.max(...byLayer.map(a=>a.length));

  byLayer.forEach((col,li)=>{
    const colH=col.length*ROW_H;
    const totalH=maxInCol*ROW_H;
    const offsetY=PAD_T+(totalH-colH)/2;
    col.forEach((nd,ri)=>{
      nd.x=PAD_L+li*COL_W;
      nd.y=offsetY+ri*ROW_H;
    });
  });

  const totalW=PAD_L+(numLayers+1)*COL_W+100;
  const totalH=PAD_T+maxInCol*ROW_H+80;
  const map={}; nodes.forEach(n=>{map[n.id]=n;});

  /* ── svg ── */
  const ct=document.getElementById("gc");
  const W=ct.clientWidth, H=ct.clientHeight;
  d3.select("#gc svg").remove();
  svg=d3.select("#gc").append("svg").attr("width",W).attr("height",H);
  gRoot=svg.append("g");

  /* ── arrow defs ── */
  const defs=svg.append("defs");
  Object.entries(CC).forEach(([k,col])=>{
    defs.append("marker").attr("id","ar-"+k)
      .attr("viewBox","0 -4 8 8").attr("refX",14).attr("refY",0)
      .attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto")
      .append("path").attr("d","M0,-4L8,0L0,4").attr("fill",col).attr("fill-opacity",.6);
  });

  /* ── layer columns ── */
  const colG=gRoot.append("g");
  for(let i=0;i<=numLayers;i++){
    const x=PAD_L+i*COL_W;
    colG.append("line").attr("x1",x).attr("x2",x)
      .attr("y1",PAD_T-30).attr("y2",totalH)
      .attr("stroke","rgba(99,179,237,.06)").attr("stroke-dasharray","4 6");
    let lbl="L"+i;
    if(i===0) lbl="L0 原材料";
    else if(i===numLayers) lbl="研究";
    colG.append("text").attr("x",x).attr("y",PAD_T-36)
      .attr("text-anchor","middle")
      .attr("font-family","JetBrains Mono,monospace").attr("font-size",9)
      .attr("fill","rgba(99,179,237,.2)").text(lbl);
  }

  /* ── edges (cubic bezier) ── */
  const eG=gRoot.append("g");
  const validE=edges.filter(e=>map[e.source]&&map[e.target]);
  linkSel=eG.selectAll("path").data(validE).join("path")
    .attr("fill","none")
    .attr("d",d=>{
      const s=map[d.source],t=map[d.target];
      const dx=(t.x-s.x);
      const c1x=s.x+dx*0.4, c2x=t.x-dx*0.4;
      return `M${s.x},${s.y} C${c1x},${s.y} ${c2x},${t.y} ${t.x},${t.y}`;
    })
    .attr("stroke",d=>CC[map[d.target].cat]||"#555")
    .attr("stroke-width",d=>Math.max(.6,Math.min(2,d.amount*.5)))
    .attr("stroke-opacity",.12)
    .attr("marker-end",d=>"url(#ar-"+map[d.target].cat+")");

  /* ── nodes ── */
  const deg={}; nodes.forEach(n=>{deg[n.id]={i:0,o:0};});
  validE.forEach(e=>{deg[e.source].o++;deg[e.target].i++;});

  const nG=gRoot.append("g");
  nodeSel=nG.selectAll("circle").data(nodes).join("circle")
    .attr("cx",d=>d.x).attr("cy",d=>d.y)
    .attr("r",d=>Math.max(3,Math.min(8,2.5+(deg[d.id].i+deg[d.id].o)*.3)))
    .attr("fill",d=>CC[d.cat]||"#555")
    .attr("stroke",d=>d3.color(CC[d.cat]||"#555").darker(.5))
    .attr("stroke-width",1.2)
    .attr("cursor","pointer")
    .on("mouseover",onOver).on("mouseout",onOut).on("click",onClick);

  /* ── labels ── */
  const lG=gRoot.append("g");
  const lbOff=d=>d.x+Math.max(5,Math.min(10,3+(deg[d.id].i+deg[d.id].o)*.3))+3;
  lblSel=lG.selectAll("text").data(nodes).join("text")
    .attr("x",d=>lbOff(d))
    .attr("y",d=>d.y)
    .attr("font-family","Noto Sans SC,sans-serif")
    .attr("fill","rgba(200,214,229,.6)")
    .style("display",showLabels?"block":"none")
    .each(function(d){
      const t=d3.select(this);
      t.append("tspan").attr("x",lbOff(d)).attr("dy","-0.3em").attr("font-size",9).attr("font-weight",500).text(d.zh);
      t.append("tspan").attr("x",lbOff(d)).attr("dy","1.2em").attr("font-size",7).attr("fill","rgba(200,214,229,.35)").text(d.name);
    });

  /* ── zoom + initial fit ── */
  const zm=d3.zoom().scaleExtent([.05,5]).on("zoom",e=>{gRoot.attr("transform",e.transform);});
  svg.call(zm);
  const s0=Math.min(W/totalW,H/totalH)*0.92;
  const tx0=(W-totalW*s0)/2, ty0=(H-totalH*s0)/2;
  svg.call(zm.transform,d3.zoomIdentity.translate(tx0,ty0).scale(s0));

  /* ── stats ── */
  document.getElementById("stats").innerHTML=
    `节点 <b>${nodes.length}</b> · 边 <b>${validE.length}</b> · 层级 <b>${numLayers+1}</b>`;

  /* ── legend ── */
  const used=new Set(nodes.map(n=>n.cat));
  const leg=document.getElementById("leg"); leg.innerHTML="";
  Object.entries(CC).forEach(([k,col])=>{
    if(!used.has(k))return;
    const cnt=nodes.filter(n=>n.cat===k).length;
    const d=document.createElement("div"); d.className="li"; d.dataset.cat=k;
    d.innerHTML=`<div class="ld" style="background:${col}"></div><span>${LL[k]||k} (${cnt})</span>`;
    d.onclick=()=>{
      d.classList.toggle("off");
      applyFilter();
    };
    leg.appendChild(d);
  });

  function applyFilter(){
    const off=new Set([...document.querySelectorAll(".li.off")].map(e=>e.dataset.cat));
    nodeSel.style("opacity",d=>off.has(d.cat)?.04:1);
    lblSel.style("opacity",d=>off.has(d.cat)?0:1);
    linkSel.style("stroke-opacity",d=>{
      const s=map[d.source],t=map[d.target];
      return (off.has(s.cat)||off.has(t.cat))?.01:.12;
    });
  }

  /* ── interactions ── */
  function onOver(ev,d){
    const tip=document.getElementById("tip");
    tip.innerHTML=`<b>${d.zh}</b> <span style="color:rgba(200,214,229,.4);font-size:10px">${d.name}</span><br><span style="color:${CC[d.cat]}">${LL[d.cat]||d.cat}</span> · Layer ${d.layer}`;
    tip.classList.add("v"); tip.style.left=(ev.pageX+10)+"px"; tip.style.top=(ev.pageY-10)+"px";
    if(!selNode) hlNode(d);
  }
  function onOut(){ document.getElementById("tip").classList.remove("v"); if(!selNode) clearHL(); }
  function onClick(ev,d){ ev.stopPropagation(); selNode=d; hlNode(d); showInfo(d); }

  function hlNode(d){
    const conn=new Set([d.id]); const hlE=new Set();
    validE.forEach(e=>{
      if(e.source===d.id||e.target===d.id){conn.add(e.source);conn.add(e.target);hlE.add(e);}
    });
    nodeSel.style("opacity",n=>conn.has(n.id)?1:.04);
    lblSel.style("opacity",n=>conn.has(n.id)?1:.03)
      .attr("font-weight",n=>n.id===d.id?700:400);
    linkSel.style("stroke-opacity",e=>hlE.has(e)?.65:.015);
  }
  function clearHL(){
    selNode=null;
    nodeSel.style("opacity",1);
    lblSel.style("opacity",1).attr("font-weight",400);
    linkSel.style("stroke-opacity",.12);
    document.getElementById("info").style.display="none";
  }

  function showInfo(d){
    const el=document.getElementById("info"); el.style.display="block";
    const ins=[],outs=[];
    validE.forEach(e=>{
      if(e.target===d.id&&map[e.source]) ins.push({nd:map[e.source],a:e.amount});
      if(e.source===d.id&&map[e.target]) outs.push({nd:map[e.target],a:e.amount});
    });
    let h=`<div class="nt">${d.zh}</div><div class="nm" style="color:rgba(200,214,229,.5);margin-bottom:2px">${d.name}</div><div class="nm">${LL[d.cat]||d.cat} · ID ${d.id} · Layer ${d.layer}</div>`;
    if(ins.length){
      h+=`<div class="sl">原料 (${ins.length})</div>`;
      ins.forEach(i=>{h+=`<div class="di" data-id="${i.nd.id}">← ${i.nd.zh} <span style="color:rgba(200,214,229,.35);font-size:9px">${i.nd.name}</span><span class="am">×${i.a}</span></div>`;});
    } else h+=`<div class="sl">原料</div><div class="di" style="color:#4fd1c5">基础资源（无需原料）</div>`;
    if(outs.length){
      h+=`<div class="sl">用于生产 (${outs.length})</div>`;
      outs.forEach(o=>{h+=`<div class="di" data-id="${o.nd.id}">→ ${o.nd.zh} <span style="color:rgba(200,214,229,.35);font-size:9px">${o.nd.name}</span></div>`;});
    }
    el.innerHTML=h;
    el.querySelectorAll(".di[data-id]").forEach(el=>{
      el.onclick=()=>{
        const nd=nodes.find(n=>n.id===+el.dataset.id);
        if(nd){selNode=nd;hlNode(nd);showInfo(nd);}
      };
    });
  }

  svg.on("click",()=>clearHL());

  /* ── search ── */
  document.getElementById("search").oninput=e=>{
    const q=e.target.value.toLowerCase().trim();
    if(!q){clearHL();return;}
    const m=nodes.filter(n=>n.name.toLowerCase().includes(q)||n.zh.includes(q));
    if(m.length===1){selNode=m[0];hlNode(m[0]);showInfo(m[0]);}
    else if(m.length>1){
      const ids=new Set(m.map(n=>n.id));
      nodeSel.style("opacity",n=>ids.has(n.id)?1:.04);
      lblSel.style("opacity",n=>ids.has(n.id)?1:.03)
        .attr("font-weight",n=>ids.has(n.id)?700:400);
    }
  };

  /* ── buttons ── */
  document.getElementById("breset").onclick=()=>{
    clearHL(); document.getElementById("search").value="";
    svg.transition().duration(400).call(zm.transform,d3.zoomIdentity.translate(tx0,ty0).scale(s0));
  };
  document.getElementById("blbl").onclick=function(){
    showLabels=!showLabels; this.classList.toggle("on",showLabels);
    lblSel.style("display",showLabels?"block":"none");
  };
  document.getElementById("bside").onclick=()=>{document.getElementById("side").classList.toggle("off");};
}

render();
window.addEventListener("resize",render);
</script>
